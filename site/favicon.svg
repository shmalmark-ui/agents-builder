      <feDropShadow dx="0" dy="1.6" stdDeviation="1.4" flood-color="#0066ff" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect class="o" x="4" y="4" width="11" height="11" rx="2"/>
  <rect class="o" x="4" y="17" width="11" height="11" rx="2"/>
  <rect class="o" x="17" y="17" width="11" height="11" rx="2"/>
  <rect class="b" x="17" y="4" width="11" height="11" rx="2" filter="url(#g)"/>
